name: firestore-stripe-payments
version: 0.3.12
specVersion: v1beta

displayName: Run Payments with Stripe
description: >
  Controls access to paid content by syncing your one-time and recurring
  payments with Firebase Authentication, and now supports Stripe Connect
  payouts for athletes.

icon: icon.png
tags: [payments]

license: Apache-2.0

sourceUrl: https://github.com/stripe/stripe-firebase-extensions/tree/master/firestore-stripe-payments
releaseNotesUrl: https://github.com/stripe/stripe-firebase-extensions/tree/master/firestore-stripe-payments/CHANGELOG.md

author:
  authorName: Invertase
  url: https://invertase.io

contributors:
  - authorName: Thorsten Schaeff
    url: https://twitter.com/thorwebdev
  - authorName: Firebase
    url: https://firebase.google.com

billingRequired: true
externalServices:
  - name: Stripe
    pricingUri: https://stripe.com/pricing

roles:
  - role: firebaseauth.admin
    reason: Allows the extension to set custom claims for users.
  - role: datastore.user
    reason: Allows the extension to store customers & subscriptions in Firestore.

resources:
  - name: createCustomer
    type: firebaseextensions.v1beta.function
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/firebase.auth/eventTypes/user.create
        resource: projects/${PROJECT_ID}

  - name: createCheckoutSession
    type: firebaseextensions.v1beta.function
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/${CUSTOMERS_COLLECTION}/{uid}/checkout_sessions/{id}

  - name: createPortalLink
    type: firebaseextensions.v1beta.function
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      httpsTrigger: {}

  - name: handleWebhookEvents
    type: firebaseextensions.v1beta.function
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      httpsTrigger: {}

  - name: onUserDeleted
    type: firebaseextensions.v1beta.function
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/firebase.auth/eventTypes/user.delete
        resource: projects/${PROJECT_ID}

  - name: onCustomerDataDeleted
    type: firebaseextensions.v1beta.function
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/${CUSTOMERS_COLLECTION}/{uid}

params:
  - param: LOCATION
    label: Cloud Functions deployment location
    type: select
    options:
      - label: Iowa (us-central1)
        value: us-central1
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Northern Virginia (us-east4)
        value: us-east4
      - label: Oregon (us-west1)
        value: us-west1
      - label: Los Angeles (us-west2)
        value: us-west2
      - label: Salt Lake City (us-west3)
        value: us-west3
      - label: Las Vegas (us-west4)
        value: us-west4
      - label: Warsaw (europe-central2)
        value: europe-central2
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: London (europe-west2)
        value: europe-west2
      - label: Frankfurt (europe-west3)
        value: europe-west3
      - label: Zurich (europe-west6)
        value: europe-west6
      - label: Hong Kong (asia-east2)
        value: asia-east2
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1
      - label: Osaka (asia-northeast2)
        value: asia-northeast2
      - label: Seoul (asia-northeast3)
        value: asia-northeast3
      - label: Mumbai (asia-south1)
        value: asia-south1
      - label: Jakarta (asia-southeast2)
        value: asia-southeast2
      - label: Montreal (northamerica-northeast1)
        value: northamerica-northeast1
      - label: Sao Paulo (southamerica-east1)
        value: southamerica-east1
      - label: Sydney (australia-southeast1)
        value: australia-southeast1
    default: us-central1
    required: true
    immutable: true

  - param: PRODUCTS_COLLECTION
    label: Products collection
    default: products
    validationRegex: "^[^/]+(/[^/]+/[^/]+)*$"
    required: true

  - param: CUSTOMERS_COLLECTION
    label: Customers collection
    default: customers
    validationRegex: "^[^/]+(/[^/]+/[^/]+)*$"
    required: true

  - param: STRIPE_CONFIG_COLLECTION
    label: Stripe configuration collection
    default: configuration
    validationRegex: "^[^/]+(/[^/]+/[^/]+)*$"
    required: false

  - param: SYNC_USERS_ON_CREATE
    label: Sync new users to Stripe
    type: select
    options:
      - label: Do not sync
        value: Do not sync
      - label: Sync
        value: Sync
    default: Do not sync
    required: true

  - param: DELETE_STRIPE_CUSTOMERS
    label: Auto-delete Stripe customers
    type: select
    options:
      - label: Do not delete
        value: Do not delete
      - label: Auto delete
        value: Auto delete
    default: Do not delete
    required: true

  - param: STRIPE_API_KEY
    label: Stripe API key
    type: secret
    example: rk_live_1234567890
    required: true

  - param: STRIPE_WEBHOOK_SECRET
    label: Stripe webhook secret
    type: secret
    example: whsec_1234567890
    required: true

  - param: CONNECT_CLIENT_ID
    label: Stripe Connect client ID
    type: secret
    example: ca_1234567890abcdef
    required: true

  - param: PLATFORM_FEE_PERCENT
    label: Default platform fee percent
    type: string
    default: "10"
    required: true

  - param: PAYOUT_DELAY_DAYS
    label: Automatic payout delay (days)
    type: string
    default: "2"
    required: true

  - param: CREATE_CHECKOUT_SESSION_MIN_INSTANCES
    label: Minimum instances for createCheckoutSession
    default: "0"
    required: true

events:
  - type: com.stripe.v1.product.created
    description: Occurs whenever a product is created.
  - type: com.stripe.v1.product.updated
    description: Occurs whenever a product is updated.
  - type: com.stripe.v1.product.deleted
    description: Occurs whenever a product is deleted.
  - type: com.stripe.v1.price.created
    description: Occurs whenever a price is created.
  - type: com.stripe.v1.price.updated
    description: Occurs whenever a price is updated.
  - type: com.stripe.v1.price.deleted
    description: Occurs whenever a price is deleted.
  - type: com.stripe.v1.checkout.session.completed
    description: Occurs when a Checkout Session completes.
  - type: com.stripe.v1.checkout.session.async_payment_succeeded
    description: Occurs when a delayed payment succeeds.
  - type: com.stripe.v1.checkout.session.async_payment_failed
    description: Occurs when a delayed payment fails.
  - type: com.stripe.v1.customer.subscription.created
    description: Occurs whenever a customer starts a subscription.
  - type: com.stripe.v1.customer.subscription.updated
    description: Occurs whenever a subscription is updated.
  - type: com.stripe.v1.customer.subscription.deleted
    description: Occurs whenever a subscription ends.
  - type: com.stripe.v1.tax_rate.created
    description: Occurs whenever a new tax rate is created.
  - type: com.stripe.v1.tax_rate.updated
    description: Occurs whenever a tax rate is updated.
  - type: com.stripe.v1.invoice.paid
    description: Occurs whenever an invoice is paid.
  - type: com.stripe.v1.invoice.payment_succeeded
    description: Occurs whenever an invoice payment succeeds.
  - type: com.stripe.v1.invoice.payment_failed
    description: Occurs whenever an invoice payment fails.
  - type: com.stripe.v1.invoice.upcoming
    description: Occurs before an upcoming invoice is created.
  - type: com.stripe.v1.invoice.marked_uncollectible
    description: Occurs whenever an invoice is marked uncollectible.
  - type: com.stripe.v1.invoice.payment_action_required
    description: Occurs whenever an invoice needs further action.
  - type: com.stripe.v1.payment_intent.processing
    description: Occurs when a PaymentIntent starts processing.
  - type: com.stripe.v1.payment_intent.succeeded
    description: Occurs when a PaymentIntent succeeds.
  - type: com.stripe.v1.payment_intent.canceled
    description: Occurs when a PaymentIntent is canceled.
  - type: com.stripe.v1.payment_intent.payment_failed
    description: Occurs when a PaymentIntent fails.

